publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

# -------------------- DEPENDENCIES --------------------
dependencies:
  flutter:
    sdk: flutter

  # ðŸŸ£ Supabase backend
  supabase_flutter: ^2.9.1

  # 🪴 State management
  flutter_riverpod: ^2.6.1
  hooks_riverpod: ^2.5.1
  flutter_hooks: ^0.20.5
  provider: ^6.1.2

  # ðŸŒ Internationalization
  intl: ^0.19.0

  # ðŸ–¼ï¸ Cached images for banners / product grids
  cached_network_image: ^3.4.1

  # âš™ï¸ Local storage & launchers
  shared_preferences: ^2.3.2
  url_launcher: ^6.3.1

  # ðŸŒ¤ Weather & API calls
  http: ^1.2.2

  # 🔱 Stripe payment integration
  flutter_stripe: ^11.5.0
  # 📱 QR code generation
  qr_flutter: ^4.1.0
  # 📱 QR code scanning
  mobile_scanner: ^7.0.1
  # 🖼️ Image picker for product uploads
  image_picker: ^1.1.2
  # �️ Image compression for uploads
  flutter_image_compress: ^2.3.0
  # 📂 File system path utilities
  path_provider: ^2.1.4
  path: ^1.9.0  # 🎯 MIME type detection for uploads
  mime: ^1.0.6  # �🔊 Audio playback for feedback
  audioplayers: ^6.0.0
  # Google authentication
  google_sign_in: 6.2.1  # Google Maps for location picking
  google_maps_flutter: ^2.5.0
  # Environment variables
  flutter_dotenv: ^5.1.0

  # Rename helper for app id / package name edits
  rename: ^3.1.0

# -------------------- DEV DEPENDENCIES --------------------
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.1

# -------------------- FLUTTER LAUNCHER ICONS --------------------
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#FAFAFA"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

# -------------------- FLUTTER CONFIG --------------------
flutter:
  uses-material-design: true
  assets:
    - assets/sfx/success_beep.mp3
    - assets/sfx/error_beep.mp3
    - .env
    - assets/icon/app_icon.png
    - assets/icon/fg.png
    - assets/icon/bg.png
    - assets/icon/wm_mark.png
    - assets/icon/wm_mark_mono.png
    - assets/banners/
    - assets/flyin/appam_stew.png
    - assets/flyin/puttu_kadala.png
    - assets/flyin/set_dosa.png
    - assets/flyin/grated_coconut.png
    - assets/flyin/angamaly_mango.png
    - assets/flyin/ulli_vada.png
    - assets/placeholders/wm_product_placeholder.png

# -------------------- FLUTTER NATIVE SPLASH --------------------
flutter_native_splash:
  color: "#F7F7F7"
  image: assets/icon/app_icon.png

  android_12:
    color: "#F7F7F7"
    image: assets/icon/app_icon.png
    icon_background_color: "#F7F7F7"

  ios: true
  android: true

